<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Contactez Ninon, illustratrice.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Ninon</a>
      <button class="nav-toggle" aria-label="Ouvrir le menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="about.html">Présentation</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
          <li><a href="boutique.html">Boutique</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-heading container">
      <h1>Contact</h1>
      <p>Une question, une envie de collaboration ? Écrivez-moi.</p>
    </div>

    <div class="contact-wrap container">
      <!-- PLACEHOLDER : remplacer l'action par votre propre endpoint Formspree (https://formspree.io) -->
      <form class="contact-form" action="https://formspree.io/f/VOTRE_ID" method="POST">
        <div>
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn btn-accent">Envoyer</button>
      </form>

      <div class="contact-info">
        <h3>Autres moyens de contact</h3>
        <p>Email : <a href="mailto:contact@votre-email.com">contact@votre-email.com</a></p>
        <div class="social-links">
          <a href="https://www.instagram.com/VOTRE_COMPTE" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-socials">
        <a href="https://www.instagram.com/VOTRE_COMPTE" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:contact@votre-email.com">Email</a>
      </div>
      <p>&copy; 2026 Ninon. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
